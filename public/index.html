<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Canvas - Premium QR Code Generator</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- QR Code Styling Library CDN -->
    <script src="https://unpkg.com/qr-code-styling@1.6.0-rc.1/lib/qr-code-styling.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0F1611; color: #E2E8F0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .accent-glow { box-shadow: 0 0 20px rgba(38, 234, 86, 0.2); }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 8px; }
    </style>
</head>
<body class="min-h-screen pb-12">
    <!-- Header -->
    <header class="border-b border-white/5 py-6 mb-8">
        <div class="container mx-auto px-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-[#26EA56] rounded-xl flex items-center justify-center accent-glow">
                    <svg class="w-6 h-6 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>
                </div>
                <h1 class="text-2xl font-black tracking-tighter">QR <span class="text-[#26EA56]">CANVAS</span></h1>
            </div>
            <div class="hidden md:block text-xs font-bold text-white/40 tracking-widest uppercase">Premium Generator v2.0</div>
        </div>
    </header>

    <main class="container mx-auto px-4 grid grid-cols-1 lg:grid-cols-12 gap-8">
        <!-- Configuration Column -->
        <div class="lg:col-span-7 space-y-6">
            <!-- Data Section -->
            <section class="glass p-6 rounded-3xl space-y-4">
                <div class="flex items-center gap-2 mb-2">
                    <span class="w-2 h-2 bg-[#26EA56] rounded-full"></span>
                    <h2 class="text-sm font-bold uppercase tracking-widest text-white/60">Step 1: Content</h2>
                </div>
                <textarea id="qr-data" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-lg focus:outline-none focus:border-[#26EA56]/50 transition-all min-h-[120px]" placeholder="Enter URL or text here...">https://google.com</textarea>
            </section>

            <!-- Style Section -->
            <section class="glass p-6 rounded-3xl grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-4">
                    <div class="flex items-center gap-2 mb-2">
                        <span class="w-2 h-2 bg-[#26EA56] rounded-full"></span>
                        <h2 class="text-sm font-bold uppercase tracking-widest text-white/60">Colors</h2>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-[10px] uppercase font-bold text-white/30">Dots Color</label>
                            <input type="color" id="fg-color" value="#000000" class="w-full h-12 cursor-pointer bg-transparent">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] uppercase font-bold text-white/30">Background</label>
                            <input type="color" id="bg-color" value="#ffffff" class="w-full h-12 cursor-pointer bg-transparent">
                        </div>
                    </div>
                </div>
                <div class="space-y-4">
                    <div class="flex items-center gap-2 mb-2">
                        <span class="w-2 h-2 bg-[#26EA56] rounded-full"></span>
                        <h2 class="text-sm font-bold uppercase tracking-widest text-white/60">Customization</h2>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] uppercase font-bold text-white/30">Dot Style</label>
                        <select id="dot-style" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 focus:outline-none">
                            <option value="extra-rounded">Extra Rounded</option>
                            <option value="rounded">Rounded</option>
                            <option value="dots">Dots</option>
                            <option value="classy">Classy</option>
                            <option value="square" selected>Square</option>
                        </select>
                    </div>
                </div>
            </section>

            <!-- Branding Section -->
            <section class="glass p-6 rounded-3xl space-y-6">
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-[#26EA56] rounded-full"></span>
                    <h2 class="text-sm font-bold uppercase tracking-widest text-white/60">Premium Branding</h2>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-3">
                        <label class="block text-xs font-bold text-white/80">Center Logo</label>
                        <div class="relative group">
                            <input type="file" id="logo-upload" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                            <div class="border-2 border-dashed border-white/10 rounded-2xl p-6 text-center group-hover:border-[#26EA56]/30 transition-all">
                                <p class="text-xs text-white/40">Upload PNG/JPG</p>
                            </div>
                        </div>
                    </div>
                    <div class="space-y-3">
                        <label class="block text-xs font-bold text-white/80">Background Image</label>
                        <div class="relative group">
                            <input type="file" id="bg-upload" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                            <div class="border-2 border-dashed border-white/10 rounded-2xl p-6 text-center group-hover:border-[#26EA56]/30 transition-all">
                                <p class="text-xs text-white/40">Full QR Cover</p>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="branding-controls" class="hidden space-y-4 pt-4 border-t border-white/5">
                    <div class="flex justify-between items-center">
                        <label class="text-[10px] uppercase font-bold text-white/40">Logo Scale</label>
                        <input type="range" id="logo-size" min="0.15" max="0.45" step="0.01" value="0.3" class="w-2/3 accent-[#26EA56]">
                    </div>
                </div>
            </section>
        </div>

        <!-- Preview Column -->
        <div class="lg:col-span-5">
            <div class="sticky top-8 space-y-6">
                <div class="glass p-8 rounded-[2.5rem] flex flex-col items-center">
                    <div class="bg-white p-4 rounded-3xl shadow-2xl mb-8 relative">
                        <div id="qrcode" class="w-[300px] h-[300px] flex items-center justify-center overflow-hidden"></div>
                        <div id="loader" class="absolute inset-0 bg-white/80 backdrop-blur-[1px] hidden items-center justify-center rounded-3xl">
                            <div class="w-8 h-8 border-4 border-[#26EA56] border-t-transparent rounded-full animate-spin"></div>
                        </div>
                    </div>
                    
                    <div class="w-full space-y-3">
                        <button onclick="downloadQR(1024, 'png')" class="w-full bg-[#26EA56] hover:bg-[#1fd44d] text-black font-black py-4 rounded-2xl transition-all transform active:scale-95 flex items-center justify-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                            Download High-Res PNG
                        </button>
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="downloadQR(1024, 'svg')" class="bg-white/5 hover:bg-white/10 text-white font-bold py-3 rounded-xl transition-all border border-white/5">SVG Vector</button>
                            <button onclick="copyLink()" class="bg-white/5 hover:bg-white/10 text-white font-bold py-3 rounded-xl transition-all border border-white/5">Copy Content</button>
                        </div>
                    </div>
                </div>

                <!-- Ad Placeholder -->
                <div class="glass p-6 rounded-3xl h-48 flex items-center justify-center text-center border-dashed border-white/10">
                    <p class="text-[10px] text-white/20 uppercase tracking-[0.4em] font-black leading-relaxed">Advertisement Space<br>Monetize Here</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-20 text-center text-white/20 text-xs font-bold uppercase tracking-widest">
        Made with ❤️ for QR Canvas &copy; 2026
    </footer>

    <script>
        let logoData = null;
        let bgData = null;
        
        const qrCode = new QRCodeStyling({
            width: 300,
            height: 300,
            type: "canvas", // CRITICAL: Use canvas for reliable PNG exports with logos
            data: "https://google.com",
            image: "",
            dotsOptions: { color: "#000000", type: "square" },
            backgroundOptions: { color: "#ffffff" },
            imageOptions: { 
                crossOrigin: "anonymous", 
                margin: 8, 
                imageSize: 0.3,
                hideBackgroundDots: true 
            },
            qrOptions: { errorCorrectionLevel: "Q" }
        });

        qrCode.append(document.getElementById("qrcode"));

        function updateQR() {
            const loader = document.getElementById('loader');
            loader.style.display = 'flex';
            
            const hasVisuals = logoData || bgData;
            
            qrCode.update({
                data: document.getElementById('qr-data').value || " ",
                image: logoData || "",
                dotsOptions: {
                    color: document.getElementById('fg-color').value,
                    type: document.getElementById('dot-style').value
                },
                backgroundOptions: {
                    color: bgData ? 'transparent' : document.getElementById('bg-color').value,
                    image: bgData || "",
                    imageOptions: {
                        crossOrigin: "anonymous",
                        opacity: 1
                    }
                },
                imageOptions: {
                    imageSize: parseFloat(document.getElementById('logo-size').value),
                    hideBackgroundDots: true
                },
                qrOptions: {
                    errorCorrectionLevel: hasVisuals ? "H" : "Q"
                }
            });

            setTimeout(() => { loader.style.display = 'none'; }, 200);
        }

        async function downloadQR(size, ext) {
            console.log(`Starting ${ext} download at ${size}px...`);
            
            // Re-sync visual state right before download to ensure canvas buffer is fresh
            updateQR();
            
            // Small delay to ensure internal canvas of the library is updated with the logo/bg image
            await new Promise(r => setTimeout(r, 200));

            try {
                await qrCode.download({
                    name: "qr-canvas-" + Date.now(),
                    extension: ext,
                    width: size,
                    height: size
                });
                console.log("Download complete.");
            } catch (err) {
                console.error("Download failed:", err);
                alert("Download failed. Please try again.");
            }
        }

        function handleFile(e, callback) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    callback(event.target.result);
                    document.getElementById('branding-controls').classList.remove('hidden');
                    updateQR();
                };
                reader.readAsDataURL(file);
            }
        }

        function copyLink() {
            const data = document.getElementById('qr-data').value;
            navigator.clipboard.writeText(data);
            alert("Copied to clipboard!");
        }

        // Event Listeners
        document.getElementById('qr-data').addEventListener('input', updateQR);
        document.getElementById('fg-color').addEventListener('input', updateQR);
        document.getElementById('bg-color').addEventListener('input', updateQR);
        document.getElementById('dot-style').addEventListener('change', updateQR);
        document.getElementById('logo-size').addEventListener('input', updateQR);

        document.getElementById('logo-upload').addEventListener('change', (e) => {
            handleFile(e, (data) => logoData = data);
        });

        document.getElementById('bg-upload').addEventListener('change', (e) => {
            handleFile(e, (data) => bgData = data);
        });

        // Initial update
        window.onload = updateQR;
    </script>
</body>
</html>
