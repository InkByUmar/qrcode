<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Canvas - Premium QR Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.9.2/lib/qr-code-styling.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #060907; color: #f8fafc; }
        .font-headline { font-family: 'Space Grotesk', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .neon-text { color: #10b981; text-shadow: 0 0 10px rgba(16, 185, 129, 0.3); }
        .neon-bg { background: #10b981; box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); }
        input, textarea, select { background: rgba(255, 255, 255, 0.02) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; }
        input:focus, textarea:focus { border-color: #10b981 !important; outline: none; ring: 2px rgba(16, 185, 129, 0.2); }
        .tab-btn.active { background: #10b981; color: #060907; }
        .qr-canvas-shadow { box-shadow: 0 30px 60px -12px rgba(0,0,0,0.6); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #060907; }
        ::-webkit-scrollbar-thumb { background: #1a221c; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen">
    <div class="max-w-7xl mx-auto px-6 py-12">
        <!-- HEADER -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-16 gap-8">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 neon-bg rounded-2xl flex items-center justify-center text-black">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>
                </div>
                <div>
                    <h1 class="text-3xl font-headline font-bold">QR <span class="neon-text">Canvas</span></h1>
                    <p class="text-[10px] font-bold tracking-[0.4em] text-gray-500 uppercase">Enterprise Design Studio</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-[11px] font-bold text-gray-500 uppercase tracking-widest px-4 py-2 border border-white/5 rounded-full">Single File Edition</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-start">
            <!-- LEFT: CONTROLS -->
            <div class="lg:col-span-7 space-y-8">
                <!-- TABS -->
                <div class="glass p-2 rounded-3xl flex flex-wrap gap-2">
                    <button onclick="switchType('URL')" class="tab-btn active px-6 py-3 rounded-2xl text-xs font-bold uppercase tracking-widest transition-all">URL</button>
                    <button onclick="switchType('Text')" class="tab-btn px-6 py-3 rounded-2xl text-xs font-bold uppercase tracking-widest transition-all">Text</button>
                    <button onclick="switchType('WiFi')" class="tab-btn px-6 py-3 rounded-2xl text-xs font-bold uppercase tracking-widest transition-all">WiFi</button>
                    <button onclick="switchType('vCard')" class="tab-btn px-6 py-3 rounded-2xl text-xs font-bold uppercase tracking-widest transition-all">vCard</button>
                    <button onclick="switchType('Email')" class="tab-btn px-6 py-3 rounded-2xl text-xs font-bold uppercase tracking-widest transition-all">Email</button>
                </div>

                <!-- CONTENT FIELDS -->
                <div class="glass p-8 rounded-[2rem] space-y-6">
                    <div id="fields-container" class="space-y-6">
                        <!-- Dynamic fields injected here -->
                    </div>
                </div>

                <!-- BRANDING & DESIGN -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <!-- MATRIX -->
                    <div class="glass p-8 rounded-[2rem] space-y-8">
                        <h3 class="text-xs font-bold uppercase tracking-[0.2em] text-gray-500">Design System</h3>
                        <div class="space-y-4">
                            <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest">Dot Style</label>
                            <select id="dot-style" onchange="generate()" class="w-full h-12 px-4 rounded-xl">
                                <option value="extra-rounded">Extra Rounded</option>
                                <option value="rounded">Rounded</option>
                                <option value="classy">Classy</option>
                                <option value="square">Square</option>
                                <option value="dots">Dots</option>
                            </select>
                        </div>
                        <div class="flex gap-4">
                            <div class="flex-1 space-y-4">
                                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest">Dots Color</label>
                                <input type="color" id="fg-color" value="#10b981" onchange="generate()" class="w-full h-12 rounded-xl p-1 cursor-pointer">
                            </div>
                            <div class="flex-1 space-y-4">
                                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest">Background</label>
                                <input type="color" id="bg-color" value="#ffffff" onchange="generate()" class="w-full h-12 rounded-xl p-1 cursor-pointer">
                            </div>
                        </div>
                    </div>

                    <!-- BRANDING -->
                    <div class="glass p-8 rounded-[2rem] space-y-8">
                        <h3 class="text-xs font-bold uppercase tracking-[0.2em] text-gray-500">Brand Assets</h3>
                        <div class="space-y-6">
                            <div class="space-y-3">
                                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest">Center Logo</label>
                                <input type="file" id="logo-input" accept="image/*" onchange="handleLogo(this)" class="w-full text-xs text-gray-500 file:bg-white/5 file:border-0 file:py-2 file:px-4 file:rounded-lg file:text-gray-300 file:mr-4">
                            </div>
                            <div class="space-y-3">
                                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest">Full Background</label>
                                <input type="file" id="bg-input" accept="image/*" onchange="handleBg(this)" class="w-full text-xs text-gray-500 file:bg-white/5 file:border-0 file:py-2 file:px-4 file:rounded-lg file:text-gray-300 file:mr-4">
                            </div>
                            <div id="bg-opacity-container" class="hidden space-y-3">
                                <div class="flex justify-between"><label class="text-[10px] uppercase font-bold text-gray-400">Opacity</label><span id="op-val" class="text-xs text-emerald-500 font-mono">100%</span></div>
                                <input type="range" id="bg-opacity" min="30" max="100" value="100" oninput="updateOpacity(this.value)" class="w-full">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RIGHT: PREVIEW -->
            <div class="lg:col-span-5 lg:sticky lg:top-12 space-y-8">
                <div class="glass p-8 rounded-[3rem] text-center relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-1 bg-emerald-500/30"></div>
                    <div class="text-[10px] font-bold uppercase tracking-[0.5em] text-emerald-500/50 mb-8">Professional Master Preview</div>
                    
                    <div class="inline-block p-8 bg-white rounded-[2.5rem] qr-canvas-shadow mb-10 transition-transform hover:scale-[1.02] duration-500">
                        <div id="qr-result" class="w-[280px] h-[280px] sm:w-[340px] sm:h-[340px]"></div>
                    </div>

                    <div class="space-y-4 px-4">
                        <button onclick="download('png')" class="w-full h-16 neon-bg text-black font-black uppercase tracking-widest rounded-2xl transition-all hover:scale-[1.02] active:scale-95 flex items-center justify-center gap-3">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                            Export 1024px PNG
                        </button>
                        <div class="grid grid-cols-2 gap-4">
                            <button onclick="download('svg')" class="h-14 bg-white/5 border border-white/10 rounded-2xl text-[10px] font-bold uppercase tracking-widest hover:bg-white/10">Vector SVG</button>
                            <button onclick="copyData()" class="h-14 bg-white/5 border border-white/10 rounded-2xl text-[10px] font-bold uppercase tracking-widest hover:bg-white/10">Copy Link</button>
                        </div>
                    </div>
                </div>

                <div id="history-box" class="glass p-8 rounded-[2rem] hidden animate-in fade-in slide-in-from-right-4">
                    <h3 class="text-xs font-bold uppercase tracking-[0.3em] text-gray-500 mb-6">Recent History</h3>
                    <div id="history-list" class="space-y-4"></div>
                </div>
            </div>
        </div>

        <footer class="mt-24 pt-12 border-t border-white/5 flex flex-col md:flex-row justify-between items-center gap-8 opacity-40 hover:opacity-100 transition-opacity">
            <p class="text-[10px] font-bold uppercase tracking-[0.3em]">&copy; 2026 QR CANVAS STUDIO PREMIUM</p>
            <div class="flex gap-6 text-[10px] font-bold uppercase tracking-widest">
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">API</a>
            </div>
        </footer>
    </div>

    <script>
        let currentType = 'URL';
        let logoData = null;
        let bgData = null;
        let processedBg = null;
        let history = [];
        const qrCode = new QRCodeStyling();

        function switchType(type) {
            currentType = type;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.includes(type)) btn.classList.add('active');
            });
            renderFields();
            generate();
        }

        function renderFields() {
            const container = document.getElementById('fields-container');
            let html = '';
            if(currentType === 'URL') {
                html = `<label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Target URL</label><input type="text" id="qr-input" value="https://google.com" oninput="generate()" class="w-full h-14 px-5 rounded-2xl text-lg font-light" placeholder="https://example.com">`;
            } else if(currentType === 'WiFi') {
                html = `<div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2"><label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Network SSID</label><input type="text" id="wifi-ssid" value="HomeNetwork" oninput="generate()" class="w-full h-12 px-4 rounded-xl"></div>
                    <div class="space-y-2"><label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Password</label><input type="text" id="wifi-pass" value="password" oninput="generate()" class="w-full h-12 px-4 rounded-xl"></div>
                    <div class="col-span-2 space-y-2"><label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Security</label><select id="wifi-enc" onchange="generate()" class="w-full h-12 px-4 rounded-xl"><option value="WPA">WPA/WPA2 (Recommended)</option><option value="WEP">WEP</option><option value="nopass">Open</option></select></div>
                </div>`;
            } else if(currentType === 'vCard') {
                html = `<div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2"><label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">First Name</label><input type="text" id="vc-fn" oninput="generate()" class="w-full h-12 px-4 rounded-xl"></div>
                    <div class="space-y-2"><label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Last Name</label><input type="text" id="vc-ln" oninput="generate()" class="w-full h-12 px-4 rounded-xl"></div>
                    <div class="col-span-2 space-y-2"><label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Mobile</label><input type="text" id="vc-mob" oninput="generate()" class="w-full h-12 px-4 rounded-xl"></div>
                </div>`;
            } else if(currentType === 'Email') {
                html = `<div class="space-y-4">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Recipient Email</label><input type="text" id="em-addr" oninput="generate()" class="w-full h-12 px-4 rounded-xl">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Subject</label><input type="text" id="em-sub" oninput="generate()" class="w-full h-12 px-4 rounded-xl">
                </div>`;
            } else {
                html = `<label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Message Text</label><textarea id="qr-input" oninput="generate()" class="w-full h-32 p-5 rounded-2xl font-light" placeholder="Type message..."></textarea>`;
            }
            container.innerHTML = html;
        }

        async function processBg() {
            if(!bgData) { processedBg = null; return; }
            const opacity = document.getElementById('bg-opacity').value / 100;
            return new Promise(resolve => {
                const img = new Image();
                img.onload = () => {
                    const canv = document.createElement('canvas');
                    canv.width = img.width; canv.height = img.height;
                    const ctx = canv.getContext('2d');
                    ctx.globalAlpha = opacity;
                    ctx.drawImage(img, 0, 0);
                    processedBg = canv.toDataURL();
                    resolve();
                };
                img.src = bgData;
            });
        }

        async function generate() {
            let data = "";
            if(currentType === 'URL' || currentType === 'Text') data = document.getElementById('qr-input').value;
            else if(currentType === 'WiFi') data = `WIFI:T:${document.getElementById('wifi-enc').value};S:${document.getElementById('wifi-ssid').value};P:${document.getElementById('wifi-pass').value};;`;
            else if(currentType === 'vCard') data = `BEGIN:VCARD\nVERSION:3.0\nN:${document.getElementById('vc-ln').value};${document.getElementById('vc-fn').value}\nTEL:${document.getElementById('vc-mob').value}\nEND:VCARD`;
            else if(currentType === 'Email') data = `mailto:${document.getElementById('em-addr').value}?subject=${document.getElementById('em-sub').value}`;

            if(bgData) await processBg();

            const config = {
                width: 400, height: 400,
                data: data || " ",
                image: logoData || "",
                dotsOptions: { color: document.getElementById('fg-color').value, type: document.getElementById('dot-style').value },
                backgroundOptions: { color: bgData ? 'transparent' : document.getElementById('bg-color').value, image: processedBg || "" },
                imageOptions: { crossOrigin: "anonymous", margin: 10, imageSize: 0.4, hideBackgroundDots: true },
                qrOptions: { errorCorrectionLevel: (logoData || bgData) ? "H" : "Q" }
            };

            qrCode.update(config);
        }

        function handleLogo(input) {
            if (input.files && input.files[0]) {
                const r = new FileReader();
                r.onload = e => { logoData = e.target.result; generate(); };
                r.readAsDataURL(input.files[0]);
            }
        }

        function handleBg(input) {
            if (input.files && input.files[0]) {
                const r = new FileReader();
                r.onload = e => { 
                    bgData = e.target.result; 
                    document.getElementById('bg-opacity-container').classList.remove('hidden');
                    document.getElementById('bg-color').disabled = true;
                    generate(); 
                };
                r.readAsDataURL(input.files[0]);
            }
        }

        function updateOpacity(v) {
            document.getElementById('op-val').innerText = v + '%';
            generate();
        }

        function download(ext) {
            qrCode.download({ name: "qr-pro-" + Date.now(), extension: ext });
            saveToHistory();
        }

        function saveToHistory() {
            let data = currentType === 'URL' || currentType === 'Text' ? document.getElementById('qr-input').value : 'Professional Asset';
            history.unshift({ data, type: currentType, time: new Date().toLocaleTimeString() });
            history = history.slice(0, 6);
            renderHistory();
        }

        function renderHistory() {
            const h = document.getElementById('history-list');
            const box = document.getElementById('history-box');
            if(history.length > 0) box.classList.remove('hidden');
            h.innerHTML = history.map(item => `
                <div class="flex items-center justify-between p-3 rounded-xl bg-white/5 border border-white/5 hover:bg-white/10 transition-all cursor-pointer">
                    <div class="overflow-hidden">
                        <p class="text-[10px] font-black text-emerald-500 uppercase tracking-tighter">${item.type}</p>
                        <p class="text-[10px] text-gray-400 truncate w-40">${item.data}</p>
                    </div>
                    <span class="text-[8px] text-gray-600 font-mono">${item.time}</span>
                </div>
            `).join('');
        }

        function copyData() {
            let data = currentType === 'URL' || currentType === 'Text' ? document.getElementById('qr-input').value : 'Complex Data';
            navigator.clipboard.writeText(data);
            alert('Content copied to clipboard!');
        }

        window.onload = () => {
            qrCode.append(document.getElementById('qr-result'));
            renderFields();
            generate();
        };
    </script>
</body>
</html>
