<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro QR Canvas - High Reliability Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/qr-code-styling@1.6.0-rc.1/lib/qr-code-styling.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e5e5e5; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .qr-shadow { box-shadow: 0 0 50px -10px rgba(34, 197, 94, 0.2); }
        input[type="color"] { -webkit-appearance: none; border: none; width: 44px; height: 44px; border-radius: 50%; overflow: hidden; cursor: pointer; background: none; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex items-center justify-between mb-12">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-green-500 rounded-xl flex items-center justify-center shadow-lg shadow-green-500/20">
                    <svg xmlns="http://www.w3.org/2000/svg" class="text-black w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="5" height="5" x="3" y="3" rx="1"/><rect width="5" height="5" x="16" y="3" rx="1"/><rect width="5" height="5" x="3" y="16" rx="1"/><path d="M21 16h-3a2 2 0 0 0-2 2v3"/><path d="M21 21v.01"/><path d="M12 7v3a2 2 0 0 1-2 2H7"/><path d="M3 12h.01"/><path d="M12 3h.01"/><path d="M12 16v.01"/><path d="M16 12h1"/><path d="M21 12v.01"/><path d="M12 21v-1"/></svg>
                </div>
                <h1 class="text-2xl font-extrabold tracking-tighter">QR CANVAS <span class="text-green-500 italic">PRO</span></h1>
            </div>
            <div class="hidden md:block text-xs font-bold text-neutral-500 tracking-widest uppercase">Verified Mobile Scannability</div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            <!-- Controls -->
            <div class="lg:col-span-7 space-y-6">
                <div class="glass p-6 rounded-3xl space-y-4">
                    <label class="text-sm font-bold text-neutral-400 uppercase tracking-widest">Content</label>
                    <textarea id="qr-data" class="w-full h-32 bg-white/5 border border-white/10 rounded-2xl p-4 text-lg focus:ring-2 focus:ring-green-500/50 outline-none transition-all placeholder:text-neutral-700" placeholder="Paste your URL or text here...">https://google.com</textarea>
                    <div class="flex justify-between text-[10px] text-neutral-500 font-medium">
                        <span>Auto-saves as you type</span>
                        <span id="char-count">0 characters</span>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Design -->
                    <div class="glass p-6 rounded-3xl space-y-6">
                        <h3 class="text-sm font-bold text-neutral-400 uppercase tracking-widest">Appearance</h3>
                        <div class="flex items-center gap-8">
                            <div class="flex flex-col items-center gap-3">
                                <input type="color" id="dots-color" value="#22c55e">
                                <span class="text-[10px] font-bold text-neutral-500">DOTS</span>
                            </div>
                            <div class="flex flex-col items-center gap-3">
                                <input type="color" id="bg-color" value="#050505">
                                <span class="text-[10px] font-bold text-neutral-500">BG</span>
                            </div>
                        </div>
                    </div>

                    <!-- Branding -->
                    <div class="glass p-6 rounded-3xl space-y-4">
                        <h3 class="text-sm font-bold text-neutral-400 uppercase tracking-widest">Logo Branding</h3>
                        <label for="logo-upload" class="flex items-center gap-4 cursor-pointer group">
                            <div class="w-14 h-14 rounded-2xl bg-white/5 border border-dashed border-white/20 flex items-center justify-center group-hover:border-green-500/50 transition-colors overflow-hidden" id="logo-preview-box">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-neutral-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
                            </div>
                            <div>
                                <span class="block text-sm font-bold group-hover:text-green-500 transition-colors">Upload Icon</span>
                                <span class="text-[10px] text-neutral-500 uppercase">SVG, PNG, or JPG</span>
                            </div>
                            <input type="file" id="logo-upload" class="hidden" accept="image/*">
                        </label>
                        <button id="clear-logo" class="hidden text-[10px] font-black text-red-500 uppercase hover:underline">Remove Logo</button>
                    </div>
                </div>
            </div>

            <!-- Preview -->
            <div class="lg:col-span-5 lg:sticky lg:top-8 space-y-6">
                <div class="glass p-8 rounded-[3rem] flex flex-col items-center qr-shadow relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-green-500/30 to-transparent"></div>
                    <div id="canvas-container" class="rounded-3xl overflow-hidden bg-white shadow-2xl p-2"></div>
                    
                    <div class="w-full mt-8 space-y-3">
                        <button onclick="download('png')" class="w-full py-4 bg-green-500 hover:bg-green-400 text-black font-black rounded-2xl transition-all active:scale-95 flex items-center justify-center gap-2 text-sm shadow-xl shadow-green-500/20 uppercase tracking-tighter">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                            Download High-Res PNG
                        </button>
                        <button onclick="download('svg')" class="w-full py-3 bg-white/5 hover:bg-white/10 text-neutral-400 font-bold rounded-2xl transition-all text-xs uppercase tracking-widest">
                            Export Vector (SVG)
                        </button>
                    </div>

                    <div class="mt-8 flex gap-6 opacity-40 grayscale contrast-200">
                        <div class="flex flex-col items-center gap-1">
                            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.96.95-2.56.95-3.52 0l-7.07-7.07a2.49 2.49 0 010-3.52l7.07-7.07c.96-.95 2.56-.95 3.52 0 .95.96.95 2.56 0 3.52L11.53 11l5.52 5.52c.95.96.95 2.56 0 3.52z"/></svg>
                            <span class="text-[8px] font-black uppercase">iOS Ready</span>
                        </div>
                        <div class="flex flex-col items-center gap-1">
                            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
                            <span class="text-[8px] font-black uppercase">Android</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvasContainer = document.getElementById('canvas-container');
        const qrInput = document.getElementById('qr-data');
        const dotsColorInput = document.getElementById('dots-color');
        const bgColorInput = document.getElementById('bg-color');
        const logoUpload = document.getElementById('logo-upload');
        const clearLogoBtn = document.getElementById('clear-logo');
        const charCount = document.getElementById('char-count');
        
        let logoData = null;

        const qrCode = new QRCodeStyling({
            width: 320,
            height: 320,
            type: "svg",
            data: qrInput.value,
            image: "",
            dotsOptions: {
                color: dotsColorInput.value,
                type: "rounded"
            },
            backgroundOptions: {
                color: bgColorInput.value,
            },
            imageOptions: {
                crossOrigin: "anonymous",
                margin: 6,
                imageSize: 0.35 // Optimized size for scannability
            },
            qrOptions: {
                typeNumber: 0,
                mode: "Byte",
                errorCorrectionLevel: "Q" // Default to reliable level
            },
            cornersSquareOptions: {
                type: "extra-rounded",
                color: dotsColorInput.value
            },
            cornersDotOptions: {
                type: "dot",
                color: dotsColorInput.value
            }
        });

        function updateQR() {
            const data = qrInput.value || " ";
            charCount.innerText = `${data.length} characters`;
            
            // Auto-upgrade error correction if logo is present
            const ecLevel = logoData ? "H" : "Q";

            qrCode.update({
                data: data,
                image: logoData || "",
                dotsOptions: { color: dotsColorInput.value },
                backgroundOptions: { color: bgColorInput.value },
                qrOptions: { errorCorrectionLevel: ecLevel },
                cornersSquareOptions: { color: dotsColorInput.value },
                cornersDotOptions: { color: dotsColorInput.value }
            });
            console.log("QR Updated. EC Level:", ecLevel);
        }

        // Event Listeners
        qrInput.addEventListener('input', updateQR);
        dotsColorInput.addEventListener('input', updateQR);
        bgColorInput.addEventListener('input', updateQR);

        logoUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    logoData = event.target.result;
                    document.getElementById('logo-preview-box').innerHTML = `<img src="${logoData}" class="w-full h-full object-contain p-1" />`;
                    clearLogoBtn.classList.remove('hidden');
                    updateQR();
                };
                reader.readAsDataURL(file);
            }
        });

        clearLogoBtn.addEventListener('click', () => {
            logoData = null;
            logoUpload.value = '';
            document.getElementById('logo-preview-box').innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-neutral-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>`;
            clearLogoBtn.classList.add('hidden');
            updateQR();
        });

        function download(ext) {
            qrCode.download({
                name: "pro-qr-canvas",
                extension: ext,
                // Higher resolution for download
                width: 1000,
                height: 1000
            });
        }

        // Initial render
        qrCode.append(canvasContainer);
        updateQR();
    </script>
</body>
</html>
