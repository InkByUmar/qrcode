<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Canvas Pro - Premium QR Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/qr-code-styling@1.6.0-rc.1/lib/qr-code-styling.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neon-border { box-shadow: 0 0 15px rgba(34, 197, 94, 0.2); border: 1px solid rgba(34, 197, 94, 0.3); }
        .qr-canvas-container canvas { border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); width: 100% !important; height: auto !important; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 8px; }
    </style>
</head>
<body class="bg-[#0A0F0B] text-white min-h-screen">

    <div class="max-w-6xl mx-auto px-4 py-12">
        <!-- Header -->
        <header class="text-center mb-12">
            <h1 class="text-4xl md:text-6xl font-extrabold tracking-tighter mb-4">
                QR <span class="text-green-500 italic">Canvas</span> Pro
            </h1>
            <p class="text-gray-400 max-w-xl mx-auto">Create artistic, high-scannability QR codes with custom branding and background images.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            
            <!-- Left: Settings -->
            <div class="lg:col-span-7 space-y-6">
                
                <!-- Content Section -->
                <div class="glass p-6 rounded-3xl space-y-4">
                    <div class="flex items-center gap-2 mb-2">
                        <div class="w-2 h-6 bg-green-500 rounded-full"></div>
                        <h2 class="text-lg font-bold uppercase tracking-widest text-green-500/80">1. Content</h2>
                    </div>
                    <textarea id="qr-data" class="w-full bg-black/40 border border-white/10 rounded-2xl p-4 text-lg focus:outline-none focus:ring-2 focus:ring-green-500/50 transition-all min-h-[120px]" placeholder="Enter URL or Text here...">https://google.com</textarea>
                </div>

                <!-- Branding Section -->
                <div class="glass p-6 rounded-3xl space-y-6">
                    <div class="flex items-center gap-2 mb-2">
                        <div class="w-2 h-6 bg-green-500 rounded-full"></div>
                        <h2 class="text-lg font-bold uppercase tracking-widest text-green-500/80">2. Premium Branding</h2>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Logo Upload -->
                        <div class="space-y-3">
                            <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest">Center Logo</label>
                            <div class="relative group">
                                <input type="file" id="logo-upload" accept="image/*" class="hidden">
                                <label for="logo-upload" class="flex items-center justify-center gap-3 w-full bg-white/5 border border-dashed border-white/20 rounded-2xl p-4 cursor-pointer hover:bg-white/10 hover:border-green-500/50 transition-all">
                                    <span class="text-sm font-medium" id="logo-name">Upload Logo</span>
                                </label>
                                <button id="clear-logo" class="absolute -top-2 -right-2 bg-red-500 text-white w-6 h-6 rounded-full text-xs hidden">✕</button>
                            </div>
                            <div class="space-y-2">
                                <div class="flex justify-between text-[10px] font-bold text-gray-500">
                                    <span>LOGO SIZE</span>
                                    <span id="logo-size-val">30%</span>
                                </div>
                                <input type="range" id="logo-size" min="0.15" max="0.45" step="0.01" value="0.30" class="w-full h-1 bg-white/10 rounded-lg appearance-none cursor-pointer accent-green-500">
                            </div>
                        </div>

                        <!-- Background Upload -->
                        <div class="space-y-3">
                            <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest">Background Image</label>
                            <div class="relative group">
                                <input type="file" id="bg-upload" accept="image/*" class="hidden">
                                <label for="bg-upload" class="flex items-center justify-center gap-3 w-full bg-white/5 border border-dashed border-white/20 rounded-2xl p-4 cursor-pointer hover:bg-white/10 hover:border-green-500/50 transition-all">
                                    <span class="text-sm font-medium" id="bg-name">Upload Background</span>
                                </label>
                                <button id="clear-bg" class="absolute -top-2 -right-2 bg-red-500 text-white w-6 h-6 rounded-full text-xs hidden">✕</button>
                            </div>
                            <div class="space-y-2">
                                <div class="flex justify-between text-[10px] font-bold text-gray-500">
                                    <span>BG OPACITY</span>
                                    <span id="bg-opacity-val">80%</span>
                                </div>
                                <input type="range" id="bg-opacity" min="0.3" max="1.0" step="0.05" value="0.8" class="w-full h-1 bg-white/10 rounded-lg appearance-none cursor-pointer accent-green-500">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Styling Section -->
                <div class="glass p-6 rounded-3xl space-y-6">
                    <div class="flex items-center gap-2 mb-2">
                        <div class="w-2 h-6 bg-green-500 rounded-full"></div>
                        <h2 class="text-lg font-bold uppercase tracking-widest text-green-500/80">3. Matrix Styling</h2>
                    </div>

                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div class="space-y-2">
                            <label class="block text-[10px] font-bold text-gray-500 uppercase">Dot Style</label>
                            <select id="dot-style" class="w-full bg-black/40 border border-white/10 rounded-xl p-2 text-sm focus:outline-none focus:ring-1 focus:ring-green-500">
                                <option value="extra-rounded">Extra Rounded</option>
                                <option value="rounded">Rounded</option>
                                <option value="classy">Classy</option>
                                <option value="square">Square</option>
                                <option value="dots">Dots</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-[10px] font-bold text-gray-500 uppercase">Corners</label>
                            <select id="corner-style" class="w-full bg-black/40 border border-white/10 rounded-xl p-2 text-sm focus:outline-none focus:ring-1 focus:ring-green-500">
                                <option value="extra-rounded">Extra Rounded</option>
                                <option value="rounded">Rounded</option>
                                <option value="dot">Dot</option>
                                <option value="square">Square</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-[10px] font-bold text-gray-500 uppercase">Dot Color</label>
                            <div class="flex gap-2">
                                <input type="color" id="dot-color" value="#22c55e" class="w-10 h-10 bg-transparent cursor-pointer">
                                <input type="text" id="dot-color-hex" value="#22C55E" class="bg-black/40 border border-white/10 rounded-xl px-2 text-xs w-full uppercase font-mono">
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-[10px] font-bold text-gray-500 uppercase">Background</label>
                            <div class="flex gap-2">
                                <input type="color" id="bg-color" value="#ffffff" class="w-10 h-10 bg-transparent cursor-pointer">
                                <input type="text" id="bg-color-hex" value="#FFFFFF" class="bg-black/40 border border-white/10 rounded-xl px-2 text-xs w-full uppercase font-mono">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: Preview -->
            <div class="lg:col-span-5 lg:sticky lg:top-12 space-y-6">
                <div class="glass p-8 rounded-[40px] flex flex-col items-center gap-8 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-green-500/50 to-transparent"></div>
                    
                    <div id="canvas-wrapper" class="qr-canvas-container w-full max-w-[320px] aspect-square bg-white rounded-[32px] p-4 flex items-center justify-center overflow-hidden">
                        <!-- QR Code will be appended here -->
                    </div>

                    <div class="w-full space-y-4">
                        <button id="download-png" class="w-full bg-green-500 hover:bg-green-400 text-black font-black py-5 rounded-2xl flex items-center justify-center gap-3 text-lg transition-all shadow-xl shadow-green-500/20 active:scale-95">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                            Export 1024px PNG
                        </button>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <button id="download-svg" class="bg-white/5 border border-white/10 hover:bg-white/10 py-3 rounded-xl text-sm font-bold transition-all">Vector SVG</button>
                            <button id="share-wa" class="bg-green-600/10 border border-green-600/20 hover:bg-green-600/20 text-green-500 py-3 rounded-xl text-sm font-bold transition-all">WhatsApp</button>
                        </div>
                    </div>

                    <div class="bg-blue-500/10 border border-blue-500/20 p-4 rounded-2xl w-full">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center">
                                <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                            </div>
                            <div>
                                <p class="text-[10px] font-black uppercase text-blue-400 tracking-wider">Smart Scannability</p>
                                <p class="text-[9px] text-blue-400/70" id="ec-status">Normal optimization active.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="mt-20 pt-8 border-t border-white/5 text-center text-gray-500 text-xs">
            <p>Made with ❤️ in Pakistan &bull; © 2025 QR Canvas Pro</p>
        </footer>
    </div>

    <script>
        let qrCode;
        let logoData = null;
        let bgData = null;

        const config = {
            width: 1000,
            height: 1000,
            data: "https://google.com",
            image: "",
            dotsOptions: { color: "#22c55e", type: "extra-rounded" },
            backgroundOptions: { color: "#ffffff", image: "", imageOptions: { opacity: 1, imageSize: 1, crossOrigin: 'anonymous' } },
            imageOptions: { crossOrigin: 'anonymous', margin: 10, imageSize: 0.3 },
            qrOptions: { errorCorrectionLevel: 'Q' }
        };

        function initQR() {
            console.log("Initializing QR Engine...");
            qrCode = new QRCodeStyling({
                ...config,
                width: 320,
                height: 320
            });
            const wrapper = document.getElementById("canvas-wrapper");
            wrapper.innerHTML = "";
            qrCode.append(wrapper);
        }

        function updateQR() {
            const data = document.getElementById("qr-data").value;
            const dotColor = document.getElementById("dot-color").value;
            const bgColor = document.getElementById("bg-color").value;
            const dotStyle = document.getElementById("dot-style").value;
            const cornerStyle = document.getElementById("corner-style").value;
            const logoSize = parseFloat(document.getElementById("logo-size").value);
            const bgOpacity = parseFloat(document.getElementById("bg-opacity").value);

            // Sync Hex Inputs
            document.getElementById("dot-color-hex").value = dotColor;
            document.getElementById("bg-color-hex").value = bgColor;
            document.getElementById("logo-size-val").innerText = Math.round(logoSize * 100) + "%";
            document.getElementById("bg-opacity-val").innerText = Math.round(bgOpacity * 100) + "%";

            // Forced Scannability Logic
            let ecLevel = 'Q';
            if (logoData || bgData) {
                ecLevel = 'H';
                document.getElementById("ec-status").innerText = "Highest Error Correction (Level H) enabled for branding.";
            } else {
                document.getElementById("ec-status").innerText = "Normal optimization active.";
            }

            const newOptions = {
                data: data || " ",
                image: logoData || "",
                dotsOptions: { color: dotColor, type: dotStyle },
                cornersSquareOptions: { color: dotColor, type: cornerStyle },
                backgroundOptions: { 
                    color: bgData ? "transparent" : bgColor,
                    image: bgData || "",
                    imageOptions: {
                        opacity: bgOpacity,
                        imageSize: 1,
                        crossOrigin: 'anonymous'
                    }
                },
                imageOptions: { 
                    imageSize: logoSize,
                    margin: 8,
                    crossOrigin: 'anonymous'
                },
                qrOptions: { errorCorrectionLevel: ecLevel }
            };

            qrCode.update(newOptions);
            console.log("QR Updated with Data:", data);
        }

        // File Handlers
        document.getElementById("logo-upload").addEventListener("change", function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    logoData = event.target.result;
                    document.getElementById("logo-name").innerText = file.name;
                    document.getElementById("clear-logo").classList.remove("hidden");
                    updateQR();
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById("bg-upload").addEventListener("change", function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    bgData = event.target.result;
                    document.getElementById("bg-name").innerText = file.name;
                    document.getElementById("clear-bg").classList.remove("hidden");
                    updateQR();
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById("clear-logo").addEventListener("click", () => {
            logoData = null;
            document.getElementById("logo-upload").value = "";
            document.getElementById("logo-name").innerText = "Upload Logo";
            document.getElementById("clear-logo").classList.add("hidden");
            updateQR();
        });

        document.getElementById("clear-bg").addEventListener("click", () => {
            bgData = null;
            document.getElementById("bg-upload").value = "";
            document.getElementById("bg-name").innerText = "Upload Background";
            document.getElementById("clear-bg").classList.add("hidden");
            updateQR();
        });

        // Event Listeners for Live Preview
        ["qr-data", "dot-color", "bg-color", "dot-style", "corner-style", "logo-size", "bg-opacity"].forEach(id => {
            document.getElementById(id).addEventListener("input", updateQR);
        });

        // Download Functions
        document.getElementById("download-png").addEventListener("click", () => {
            qrCode.download({ name: "qr-pro-" + Date.now(), extension: "png", width: 1024, height: 1024 });
        });

        document.getElementById("download-svg").addEventListener("click", () => {
            qrCode.download({ name: "qr-pro-" + Date.now(), extension: "svg" });
        });

        document.getElementById("share-wa").addEventListener("click", () => {
            const data = document.getElementById("qr-data").value;
            window.open(`https://wa.me/?text=${encodeURIComponent("Check out my QR: " + data)}`, "_blank");
        });

        // Init on load
        window.onload = initQR;
    </script>
</body>
</html>
